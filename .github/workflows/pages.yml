name: Validate GitHub Pages Content

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Pages files
        run: |
          test -f docs/index.html
          test -f docs/.nojekyll
          test -f docs/reportes-calidad/index.html

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate quality reports
        run: npm run reports:quality

      - name: Validate generated quality reports
        run: |
          test -f reports/index.html
          test -f reports/unit/index.html
          test -f reports/coverage/index.html
