name: Database Load Performance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  performance:
    name: Performance threshold check (${{ matrix.engine }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        engine:
          - sqlserver
          - mysql
          - postgresql
          - oracle
          - sqlite
          - mongodb
          - redis

    env:
      PERF_ENGINE: ${{ matrix.engine }}
      PERF_TOTAL_QUERIES: 240
      PERF_CONCURRENCY: 24
      PERF_MAX_AVG_LATENCY_MS: 120
      PERF_MAX_P95_LATENCY_MS: 180
      PERF_MAX_ERROR_RATE: 0.03
      PERF_MIN_TPS: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build project
        run: npm run build

      - name: Run database load simulation
        run: npm run test:performance

      - name: Upload performance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-report-${{ matrix.engine }}
          path: reports/

  summary:
    name: Consolidated performance summary
    runs-on: ubuntu-latest
    needs: performance
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download performance reports
        uses: actions/download-artifact@v4
        with:
          pattern: performance-report-*
          path: reports/engines

      - name: Generate consolidated summary
        run: node scripts/performance-summary.mjs reports/engines

      - name: Upload consolidated report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-summary
          path: reports/performance-summary.*
