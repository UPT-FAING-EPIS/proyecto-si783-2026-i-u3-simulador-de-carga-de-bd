<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reportes de Calidad</title>
  <style>
  body {
    color: #111827;
    font-family: Georgia, "Times New Roman", serif;
    margin: 24px;
    max-width: 980px;
  }

  h1 {
    font-size: 32px;
    margin: 0 0 18px;
  }

  h2 {
    border-bottom: 1px solid #d1d5db;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 18px;
    margin-top: 28px;
    padding-bottom: 6px;
  }

  ul {
    font-size: 16px;
    line-height: 1.5;
  }

  .grid {
    display: grid;
    gap: 12px;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    margin: 18px 0;
  }

  .metric {
    border: 1px solid #d1d5db;
    border-radius: 6px;
    font-family: Arial, Helvetica, sans-serif;
    padding: 12px;
  }

  .metric strong {
    display: block;
    font-size: 24px;
  }

  table {
    border-collapse: collapse;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 14px;
    width: 100%;
  }

  th, td {
    border: 1px solid #d1d5db;
    padding: 8px 10px;
    text-align: left;
    vertical-align: top;
  }

  th {
    background: #f3f4f6;
  }

  code {
    background: #f3f4f6;
    border-radius: 4px;
    font-size: 12px;
    padding: 2px 4px;
  }

  .ok {
    color: #166534;
    font-weight: 700;
  }

  .bad {
    color: #991b1b;
    font-weight: 700;
  }
</style>
</head>
<body>
  <h1>Reportes de Calidad</h1>
  <ul>
    <li><a href="./coverage/index.html">Reporte de Cobertura (Vitest)</a></li>
    <li><a href="./unit/index.html">Reporte de Pruebas Unitarias</a></li>
  </ul>

  <h2>Resumen</h2>
  <div class="grid">
    <div class="metric"><strong>15</strong> pruebas</div>
    <div class="metric"><strong class="ok">15</strong> aprobadas</div>
    <div class="metric"><strong class="ok">0</strong> fallidas</div>
    <div class="metric"><strong>12</strong> suites</div>
  </div>

  <h2>Cobertura</h2>
  <div class="grid">
    <div class="metric"><strong>13.24%</strong> lineas</div>
    <div class="metric"><strong>12.18%</strong> sentencias</div>
    <div class="metric"><strong>6.78%</strong> funciones</div>
    <div class="metric"><strong>5.64%</strong> ramas</div>
  </div>

  <p>Generado: 5/7/2026, 3:41:25 a. m.</p>
</body>
</html>
