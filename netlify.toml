[build]
  command = "npm run build"
  publish = "dist"

# ── Clean URLs ────────────────────────────────────────────────────────────────

[[redirects]]
  from  = "/simulador"
  to    = "/simulator.html"
  status = 200

[[redirects]]
  from  = "/admin"
  to    = "/admin.html"
  status = 200

[[redirects]]
  from  = "/app"
  to    = "/app.html"
  status = 200

# ── Security headers ─────────────────────────────────────────────────────────

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/styles.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
